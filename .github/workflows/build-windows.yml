name: Build Windows installer

on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: build-windows-release
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check release version and duplicate assets
        id: preflight
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          if [[ -n "${RELEASE_EVENT_TAG:-}" && "$RELEASE_EVENT_TAG" != "$tag" ]]; then
            echo "Release tag $RELEASE_EVENT_TAG does not match package version $version" >&2
            exit 1
          fi

          expected_assets=(
            "lingxiu-cover-setup-$version.exe"
            "lingxiu-cover-setup-$version.exe.blockmap"
            "latest.yml"
          )

          if ! remote_assets="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null)"; then
            echo "No existing $tag release; electron-builder will create it."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          found=0
          for asset in "${expected_assets[@]}"; do
            if grep -Fxq "$asset" <<< "$remote_assets"; then
              found=$((found + 1))
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "Release $tag has no Windows assets yet."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "$found" -eq "${#expected_assets[@]}" ]]; then
            echo "Release $tag already has every Windows asset; skipping duplicate publish."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag has a partial Windows asset set ($found/${#expected_assets[@]})." >&2
            echo "Resolve the partial release manually instead of overwriting assets." >&2
            exit 1
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.should_build == 'true'
        run: npm ci

      - name: Run static and semantic tests
        if: steps.preflight.outputs.should_build == 'true'
        run: npm test

      - name: Prepare pinned Windows media helpers
        if: steps.preflight.outputs.should_build == 'true'
        shell: bash
        run: bash scripts/setup-win.sh

      - name: Build and publish Windows installer
        if: steps.preflight.outputs.should_build == 'true'
        run: npx electron-builder --win --publish always
