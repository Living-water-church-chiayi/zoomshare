appId: com.lingxiu.cover
productName: 靈修封面
publish:
  provider: github
  owner: Living-water-church-chiayi
  repo: zoomshare
  releaseType: release
directories:
  output: dist
files:
  - src/**/*
  - "!**/*.map"
  # Keep only the three font files referenced by the renderer stylesheet.
  - "!src/renderer/fonts/TW-Kai.ttf"
  - "!src/renderer/fonts/SourceHanSansTC-Regular.otf"
  - "!src/renderer/fonts/SourceHanSansTC-Medium.otf"
  - "!src/renderer/fonts/SourceHanSerifTC-Regular.otf"
  - "!src/renderer/fonts/SourceHanSerifTC-Medium.otf"
  - "!src/renderer/fonts/SourceHanSerifTC-Heavy.otf"
win:
  icon: build/icon.ico
  target:
    - nsis
  # Preserve app name/version/icon resources while intentionally skipping
  # Authenticode until a Windows signing certificate is configured.
  signExecutable: false
  # Keep the published filename aligned with latest.yml and safe for updater URLs.
  artifactName: lingxiu-cover-setup-${version}.${ext}
  extraResources:
    - from: resources/bin/win
      to: bin
      filter:
        - "**/*"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  category: public.app-category.productivity
  minimumSystemVersion: "12.0"
  artifactName: Lingxiu-Cover-${version}-${arch}.${ext}   # 純 ASCII，避免 CJK 檔名上傳失敗
  # electron-builder re-signs these nested Mach-O helpers with the Developer
  # ID identity when CSC_LINK/CSC_KEY_PASSWORD are available.
  binaries:
    - Contents/Resources/bin/yt-dlp_macos
    - Contents/Resources/bin/deno
    - Contents/Resources/bin/ffmpeg
    - Contents/Resources/bin/ffprobe
  extraResources:
    - from: resources/bin/mac
      to: bin
      filter:
        - "**/*"
