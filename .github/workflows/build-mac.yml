name: Build macOS universal (.dmg + .zip)

# A published Windows release triggers the matching universal Mac build.
# Manual runs are still available; duplicate assets are detected before work starts.
on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: write

# Serialize every Mac publisher run. This also prevents a manual run racing the
# release event for the same version; the queued run then exits at preflight.
concurrency:
  group: build-macos-release
  cancel-in-progress: false

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check release version and duplicate assets
        id: preflight
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          if [[ -n "${RELEASE_EVENT_TAG:-}" && "$RELEASE_EVENT_TAG" != "$tag" ]]; then
            echo "Release tag $RELEASE_EVENT_TAG does not match package version $version" >&2
            exit 1
          fi

          expected_assets=(
            "Lingxiu-Cover-$version-universal.dmg"
            "Lingxiu-Cover-$version-universal.dmg.blockmap"
            "Lingxiu-Cover-$version-universal.zip"
            "Lingxiu-Cover-$version-universal.zip.blockmap"
            "latest-mac.yml"
          )

          if ! remote_assets="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null)"; then
            echo "No existing $tag release; electron-builder will create it."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          found=0
          for asset in "${expected_assets[@]}"; do
            if grep -Fxq "$asset" <<< "$remote_assets"; then
              found=$((found + 1))
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "Release $tag has no universal Mac assets yet."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "$found" -eq "${#expected_assets[@]}" ]]; then
            echo "Release $tag already has every universal Mac asset; skipping duplicate publish."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag has a partial universal Mac asset set ($found/${#expected_assets[@]})." >&2
            echo "Resolve the partial release manually instead of overwriting assets." >&2
            exit 1
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.should_build == 'true'
        run: npm ci

      - name: Run static and semantic tests
        if: steps.preflight.outputs.should_build == 'true'
        run: npm test

      - name: Prepare pinned universal media helpers
        if: steps.preflight.outputs.should_build == 'true'
        run: bash scripts/setup-mac.sh

      - name: Build and publish universal macOS artifacts
        if: steps.preflight.outputs.should_build == 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${CSC_LINK:-}" || -z "${CSC_KEY_PASSWORD:-}" \
                || -z "${APPLE_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" \
                || -z "${APPLE_TEAM_ID:-}" ]]; then
            echo "Developer ID signing and notarization secrets are required for a public macOS release." >&2
            exit 1
          fi
          echo "Developer ID signing and Apple notarization are enabled."
          npx electron-builder --mac --universal --publish always -c.mac.notarize=true
