name: Build macOS universal (.dmg + .zip)

# A published Windows release triggers the matching universal Mac build.
# Manual runs are still available; duplicate assets are detected before work starts.
on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: write

# Serialize every Mac publisher run. This also prevents a manual run racing the
# release event for the same version; the queued run then exits at preflight.
concurrency:
  group: build-macos-release
  cancel-in-progress: false

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check release version and duplicate assets
        id: preflight
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v$version"
          if [[ -n "${RELEASE_EVENT_TAG:-}" && "$RELEASE_EVENT_TAG" != "$tag" ]]; then
            echo "Release tag $RELEASE_EVENT_TAG does not match package version $version" >&2
            exit 1
          fi

          expected_assets=(
            "Lingxiu-Cover-$version-universal.dmg"
            "Lingxiu-Cover-$version-universal.dmg.blockmap"
            "Lingxiu-Cover-$version-universal.zip"
            "Lingxiu-Cover-$version-universal.zip.blockmap"
            "latest-mac.yml"
          )

          if ! remote_assets="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null)"; then
            echo "No existing $tag release; electron-builder will create it."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          found=0
          for asset in "${expected_assets[@]}"; do
            if grep -Fxq "$asset" <<< "$remote_assets"; then
              found=$((found + 1))
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "Release $tag has no universal Mac assets yet."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "$found" -eq "${#expected_assets[@]}" ]]; then
            echo "Release $tag already has every universal Mac asset; skipping duplicate publish."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag has a partial universal Mac asset set ($found/${#expected_assets[@]})." >&2
            echo "Resolve the partial release manually instead of overwriting assets." >&2
            exit 1
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.should_build == 'true'
        run: npm ci

      - name: Run static and semantic tests
        if: steps.preflight.outputs.should_build == 'true'
        run: npm test

      - name: Prepare pinned universal media helpers
        if: steps.preflight.outputs.should_build == 'true'
        run: bash scripts/setup-mac.sh

      - name: Select macOS signing mode
        if: steps.preflight.outputs.should_build == 'true'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_SELF_SIGNED_CSC_LINK: ${{ secrets.MAC_SELF_SIGNED_CSC_LINK }}
          MAC_SELF_SIGNED_CSC_KEY_PASSWORD: ${{ secrets.MAC_SELF_SIGNED_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${MAC_CSC_LINK:-}" && -n "${MAC_CSC_KEY_PASSWORD:-}" \
                && -n "${MAC_APPLE_ID:-}" && -n "${MAC_APPLE_APP_SPECIFIC_PASSWORD:-}" \
                && -n "${MAC_APPLE_TEAM_ID:-}" ]]; then
            echo "MAC_SIGNING_MODE=developer-id" >> "$GITHUB_ENV"
            echo "CSC_LINK=$MAC_CSC_LINK" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_ID=$MAC_APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$MAC_APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$MAC_APPLE_TEAM_ID" >> "$GITHUB_ENV"
            echo "Using Developer ID signing with Apple notarization."
          elif [[ -n "${MAC_SELF_SIGNED_CSC_LINK:-}" && -n "${MAC_SELF_SIGNED_CSC_KEY_PASSWORD:-}" ]]; then
            echo "MAC_SIGNING_MODE=self-signed" >> "$GITHUB_ENV"
            echo "Using stable self-signed macOS signing without notarization."
          else
            echo "Mac releases require either Developer ID secrets or stable self-signed signing secrets." >&2
            exit 1
          fi

      - name: Import stable self-signed signing certificate
        if: steps.preflight.outputs.should_build == 'true'
        shell: bash
        env:
          MAC_SELF_SIGNED_CSC_LINK: ${{ secrets.MAC_SELF_SIGNED_CSC_LINK }}
          MAC_SELF_SIGNED_CSC_KEY_PASSWORD: ${{ secrets.MAC_SELF_SIGNED_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ "${MAC_SIGNING_MODE:-}" != "self-signed" ]]; then
            echo "Skipping self-signed certificate import for signing mode: ${MAC_SIGNING_MODE:-unknown}"
            exit 0
          fi

          keychain_password="$(openssl rand -hex 24)"
          keychain_path="$RUNNER_TEMP/lingxiu-self-signed.keychain-db"
          certificate_path="$RUNNER_TEMP/lingxiu-self-signed.p12"
          certificate_pem="$RUNNER_TEMP/lingxiu-self-signed.pem"

          printf '%s' "$MAC_SELF_SIGNED_CSC_LINK" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          openssl pkcs12 -legacy -in "$certificate_path" -clcerts -nokeys \
            -out "$certificate_pem" -passin "pass:$MAC_SELF_SIGNED_CSC_KEY_PASSWORD"
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain "$certificate_pem"

          security import "$certificate_path" -k "$keychain_path" -P "$MAC_SELF_SIGNED_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db

          if ! security find-identity -v -p codesigning | grep -Fq 'Lingxiu Cover Stable Signing'; then
            echo "Stable self-signed signing identity was not imported successfully." >&2
            exit 1
          fi
          echo "CSC_NAME=Lingxiu Cover Stable Signing" >> "$GITHUB_ENV"

      - name: Build and publish universal macOS artifacts
        if: steps.preflight.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$MAC_SIGNING_MODE" == "developer-id" ]]; then
            echo "Developer ID signing and Apple notarization are enabled."
            npx electron-builder --mac --universal --publish always -c.mac.notarize=true
          elif [[ "$MAC_SIGNING_MODE" == "self-signed" ]]; then
            echo "Stable self-signed signing is enabled; notarization and timestamping are disabled."
            env -u CSC_LINK -u CSC_KEY_PASSWORD \
              npx electron-builder --mac --universal --publish always \
                -c.mac.notarize=false \
                -c.mac.timestamp=none
          else
            echo "Unknown macOS signing mode: ${MAC_SIGNING_MODE:-}" >&2
            exit 1
          fi

      - name: Verify stable macOS code signatures
        if: steps.preflight.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          app_path="dist/mac-universal/靈修封面.app"
          test -d "$app_path" || { echo "Packaged app is missing: $app_path" >&2; exit 1; }

          verify_item() {
            local item="$1"
            local details
            codesign --verify --strict --verbose=2 "$item"
            details="$(codesign -dv --verbose=4 "$item" 2>&1)"
            echo "$details" | sed -n '1,40p'
            if grep -Fq 'Signature=adhoc' <<< "$details"; then
              echo "Ad-hoc signature is not allowed in public macOS artifacts: $item" >&2
              exit 1
            fi
            if [[ "$MAC_SIGNING_MODE" == "self-signed" ]] && ! grep -Fq 'Authority=Lingxiu Cover Stable Signing' <<< "$details"; then
              echo "Self-signed artifact is not signed by Lingxiu Cover Stable Signing: $item" >&2
              exit 1
            fi
          }

          verify_item "$app_path"
          while IFS= read -r helper_app; do
            verify_item "$helper_app"
          done < <(find "$app_path/Contents/Frameworks" -maxdepth 1 -type d -name '*.app' -print | sort)

          for helper in yt-dlp_macos deno ffmpeg ffprobe lingxiu-audio-player; do
            verify_item "$app_path/Contents/Resources/bin/$helper"
          done
